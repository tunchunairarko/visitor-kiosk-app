name: Test

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-dev libsqlite3-dev
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
        
      - name: Run linting
        working-directory: src
        run: npm run lint
        
      # - name: Run tests
      #   run: pnpm test
        
      # - name: Build application
      #   run: pnpm build
        
      - name: Test Electron build
        run: npm run dist
